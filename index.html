<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ars — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep: #0a0c1a;
      --mid: #111425;
      --accent: #c8a97e;
      --soft: rgba(255,255,255,0.55);
      --faint: rgba(255,255,255,0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--deep);
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 3rem;
      background: linear-gradient(to bottom, rgba(10,12,26,0.9) 0%, transparent 100%);
      transition: background 0.4s;
    }
    nav.scrolled { background: rgba(10,12,26,0.95); backdrop-filter: blur(12px); }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2.5rem; }
    .nav-links a {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--soft);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* ── HERO ── */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: -20%;
      background: url('Ars_Portfolio_copy.jpg') center top / cover no-repeat;
      transform: translateY(0);
      will-change: transform;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,12,26,0.15) 0%,
        rgba(10,12,26,0.3) 60%,
        rgba(10,12,26,0.9) 100%
      );
    }
    .hero-content {
      position: relative;
      text-align: center;
      z-index: 2;
      animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    .hero-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: 0.04em;
    }
    .hero-title em { font-style: italic; color: var(--accent); }
    .hero-sub {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--faint);
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      animation: bounce 2.4s ease-in-out infinite;
      z-index: 3;
    }
    .scroll-hint::after {
      content: '';
      display: block;
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
    }

    /* ── PORTFOLIO SECTION ── */
    .portfolio-section {
      position: relative;
    }

    /* sticky progress indicator */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: var(--accent);
      width: 0%;
      z-index: 200;
      transition: width 0.1s linear;
    }

    /* the actual image wrapper with parallax */
    .portfolio-image-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
    }
    .portfolio-image-wrap img {
      width: 100%;
      display: block;
      transform: scale(1.06) translateY(0px);
      will-change: transform;
      transition: transform 0.05s linear;
    }

    /* slide markers — floating labels that appear as you scroll */
    .slide-marker {
      position: absolute;
      right: 3rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
    }
    .slide-marker.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .slide-marker-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.1em;
    }
    .slide-marker-line {
      width: 32px;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--mid);
      padding: 4rem 3rem;
      text-align: center;
      border-top: 1px solid rgba(200,169,126,0.15);
    }
    .footer-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-bottom: 0.75rem;
    }
    .footer-tagline {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 2rem;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
    }
    .footer-links a {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--faint);
      text-decoration: none;
      transition: color 0.3s;
    }
    .footer-links a:hover { color: var(--accent); }
    .footer-copy {
      margin-top: 2.5rem;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.15em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(8px); }
    }

    /* ── CURSOR DOT ── */
    .cursor {
      position: fixed;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: transform 0.08s ease, opacity 0.3s;
    }
    .cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid rgba(200,169,126,0.45);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%,-50%);
      transition: transform 0.18s ease, width 0.2s, height 0.2s, opacity 0.3s;
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .slide-marker { right: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Custom cursor (desktop only) -->
  <div class="cursor" id="cur"></div>
  <div class="cursor-ring" id="curRing"></div>

  <!-- Progress bar -->
  <div class="progress-bar" id="progress"></div>

  <!-- Nav -->
  <nav id="nav">
    <a class="nav-logo" href="#">Ars</a>
    <div class="nav-links">
      <a href="#portfolio">Portfolio</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">Creative Portfolio</p>
      <h1 class="hero-title">Ars<br><em>Portfolio</em></h1>
      <p class="hero-sub">Design &nbsp;·&nbsp; Visual &nbsp;·&nbsp; Creative</p>
    </div>
    <div class="scroll-hint">scroll</div>
  </section>

  <!-- Portfolio — full image with parallax -->
  <section class="portfolio-section" id="portfolio">
    <div class="portfolio-image-wrap" id="imgWrap">
      <img src="Ars_Portfolio_copy.jpg" id="portfolioImg" alt="Ars Portfolio" />

      <!-- Slide position markers — positioned at each ~10% of image height -->
      <div class="slide-marker" id="m1" style="top:5%"><span class="slide-marker-num">01</span><span class="slide-marker-line"></span></div>
      <div class="slide-marker" id="m2" style="top:15%"><span class="slide-marker-num">02</span><span class="slide-marker-line"></span></div>
      <div class="slide-marker" id="m3" style="top:25%"><span class="slide-marker-num">03</span><span class="slide-marker-line"></span></div>
      <div class="slide-marker" id="m4" style="top:35%"><span class="slide-marker-num">04</span><span class="slide-marker-line"></span></div>
      <div class="slide-marker" id="m5" style="top:45%"><span class="slide-marker-num">05</span><span class="slide-marker-line"></span></div>
      <div class="slide-marker" id="m6" style="top:55%"><span class="slide-marker-num">06</span><span class="slide-marker-line"></span></div>
      <div class="slide-marker" id="m7" style="top:65%"><span class="slide-marker-num">07</span><span class="slide-marker-line"></span></div>
      <div class="slide-marker" id="m8" style="top:75%"><span class="slide-marker-num">08</span><span class="slide-marker-line"></span></div>
      <div class="slide-marker" id="m9" style="top:85%"><span class="slide-marker-num">09</span><span class="slide-marker-line"></span></div>
      <div class="slide-marker" id="m10" style="top:95%"><span class="slide-marker-num">10</span><span class="slide-marker-line"></span></div>
    </div>
  </section>

  <!-- Footer / Contact -->
  <footer id="contact">
    <p class="footer-name">Ars</p>
    <p class="footer-tagline">Graphic Designer &amp; Creative</p>
    <div class="footer-links">
      <a href="mailto:your@email.com">Email</a>
      <a href="https://instagram.com/" target="_blank">Instagram</a>
      <a href="https://linkedin.com/" target="_blank">LinkedIn</a>
    </div>
    <p class="footer-copy">&copy; 2025 Ars. All rights reserved.</p>
  </footer>

  <script>
    // ── Cursor
    const cur = document.getElementById('cur');
    const curRing = document.getElementById('curRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function loop() {
      rx += (mx - rx) * 0.15;
      ry += (my - ry) * 0.15;
      cur.style.left = mx + 'px'; cur.style.top = my + 'px';
      curRing.style.left = rx + 'px'; curRing.style.top = ry + 'px';
      requestAnimationFrame(loop);
    })();

    // ── Progress bar
    const progress = document.getElementById('progress');
    const nav = document.getElementById('nav');
    const heroBg = document.getElementById('heroBg');
    const imgWrap = document.getElementById('imgWrap');

    // ── Slide markers
    const markers = document.querySelectorAll('.slide-marker');

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const docH = document.documentElement.scrollHeight - window.innerHeight;

      // progress bar
      progress.style.width = (scrollY / docH * 100) + '%';

      // nav background
      nav.classList.toggle('scrolled', scrollY > 60);

      // hero parallax
      heroBg.style.transform = `translateY(${scrollY * 0.45}px)`;

      // portfolio image subtle parallax
      const wrapTop = imgWrap.getBoundingClientRect().top + scrollY;
      const relScroll = scrollY - wrapTop;
      const imgEl = document.getElementById('portfolioImg');
      if (relScroll > -window.innerHeight) {
        imgEl.style.transform = `scale(1.06) translateY(${relScroll * 0.03}px)`;
      }

      // slide markers visibility
      markers.forEach((m, i) => {
        const rect = m.getBoundingClientRect();
        if (rect.top < window.innerHeight * 0.75 && rect.bottom > 0) {
          m.classList.add('visible');
        }
      });
    });
  </script>
</body>
</html>
